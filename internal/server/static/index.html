<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dogear</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #202124;
      --muted: #626a73;
      --line: #d7d9dc;
      --accent: #176b6b;
      --accent-strong: #104f4f;
      --warn: #8a4c13;
      --code: #f0f2f2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171819;
        --panel: #202224;
        --text: #eceff1;
        --muted: #aab1b7;
        --line: #393d41;
        --accent: #65b7ad;
        --accent-strong: #8ccfc6;
        --warn: #e2a64d;
        --code: #292d30;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding: 0 18px;
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0; }
    main {
      display: grid;
      grid-template-columns: minmax(220px, 300px) 1fr;
      min-height: calc(100vh - 52px);
    }
    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      overflow: auto;
    }
    section { padding: 16px; overflow: auto; }
    label { display: block; margin: 0 0 6px; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    input, textarea, select { padding: 9px 10px; }
    textarea { min-height: 90px; resize: vertical; }
    button {
      cursor: pointer;
      padding: 9px 11px;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    button.secondary {
      background: transparent;
      color: var(--accent-strong);
      border-color: var(--line);
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 120px 120px;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      min-height: 160px;
      padding: 14px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0;
    }
    .doc, .result, .source {
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
    }
    .doc:first-child, .result:first-child, .source:first-child { padding-top: 0; }
    .doc:last-child, .result:last-child, .source:last-child { border-bottom: 0; padding-bottom: 0; }
    .title { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .snippet { margin: 7px 0 0; white-space: pre-wrap; }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: var(--code);
      border-radius: 6px;
      padding: 10px;
      margin: 8px 0 0;
    }
    .status { color: var(--muted); font-size: 12px; }
    .error { color: var(--warn); }
    @media (max-width: 820px) {
      header { height: auto; min-height: 52px; align-items: flex-start; flex-direction: column; padding: 12px 14px; }
      main, .split, .toolbar { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); max-height: 260px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dogear</h1>
    <div id="health" class="status">checking database</div>
  </header>
  <main>
    <aside>
      <label for="docFilter">Document</label>
      <select id="docFilter"><option value="">All documents</option></select>
      <div id="docs" style="margin-top:14px"></div>
    </aside>
    <section>
      <div class="toolbar">
        <div>
          <label for="query">Search</label>
          <input id="query" placeholder="local control">
        </div>
        <div>
          <label for="limit">Limit</label>
          <input id="limit" type="number" min="1" value="8">
        </div>
        <button id="searchBtn">Search</button>
      </div>
      <div class="split">
        <div class="panel">
          <h2>Results</h2>
          <div id="results" class="status">No search yet.</div>
        </div>
        <div class="panel">
          <h2>Ask</h2>
          <label for="question">Question</label>
          <textarea id="question" placeholder="How do I turn off local control?"></textarea>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
            <button id="askBtn">Ask</button>
            <button id="dryRunBtn" class="secondary">Dry run</button>
          </div>
          <div id="answer" style="margin-top:12px" class="status">No answer yet.</div>
        </div>
      </div>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);

    async function api(path, options) {
      const response = await fetch(path, options);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || response.statusText);
      return data;
    }

    function sourceLine(item) {
      const page = item.page_number ? ` p.${item.page_number}` : "";
      const heading = item.heading_path ? ` | ${item.heading_path}` : "";
      return `${item.title}${page}${heading} | lines ${item.start_line}-${item.end_line}`;
    }

    async function loadHealth() {
      try {
        await api("/api/health");
        $("health").textContent = "ready";
      } catch (err) {
        $("health").textContent = err.message;
        $("health").classList.add("error");
      }
    }

    async function loadDocs() {
      const docs = await api("/api/documents");
      $("docFilter").innerHTML = '<option value="">All documents</option>' + docs.map((doc) =>
        `<option value="${doc.id}">${doc.title}</option>`
      ).join("");
      $("docs").innerHTML = docs.length ? docs.map((doc) => `
        <div class="doc">
          <div class="title">${doc.title}</div>
          <div class="meta">${doc.id} | ${doc.brand || ""} ${doc.model || ""} | ${doc.chunk_count} chunks</div>
        </div>
      `).join("") : '<div class="status">No documents imported.</div>';
    }

    async function runSearch() {
      const q = $("query").value.trim();
      if (!q) return;
      $("results").textContent = "Searching...";
      try {
        const params = new URLSearchParams({ q, limit: $("limit").value || "8" });
        if ($("docFilter").value) params.set("doc", $("docFilter").value);
        const results = await api(`/api/search?${params}`);
        $("results").className = "";
        $("results").innerHTML = results.length ? results.map((item) => `
          <div class="result">
            <div class="title">${sourceLine(item)}</div>
            <div class="meta">score ${item.score.toFixed(3)}</div>
            <div class="snippet">${item.snippet}</div>
          </div>
        `).join("") : '<div class="status">No results.</div>';
      } catch (err) {
        $("results").className = "error";
        $("results").textContent = err.message;
      }
    }

    async function runAsk(dryRun) {
      const question = $("question").value.trim() || $("query").value.trim();
      if (!question) return;
      $("answer").textContent = dryRun ? "Preparing request..." : "Asking provider...";
      try {
        const result = await api("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question,
            doc: $("docFilter").value,
            limit: Number($("limit").value || 8),
            dry_run: dryRun
          })
        });
        $("answer").className = "";
        if (dryRun) {
          $("answer").innerHTML = `<pre>${JSON.stringify(result.dry_run, null, 2)}</pre>`;
          return;
        }
        $("answer").innerHTML = `
          <div>${result.answer}</div>
          <h2 style="margin-top:14px">Sources</h2>
          ${result.sources.map((source) => `<div class="source">${source.label} ${sourceLine(source)}</div>`).join("")}
        `;
      } catch (err) {
        $("answer").className = "error";
        $("answer").textContent = err.message;
      }
    }

    $("searchBtn").addEventListener("click", runSearch);
    $("query").addEventListener("keydown", (event) => {
      if (event.key === "Enter") runSearch();
    });
    $("askBtn").addEventListener("click", () => runAsk(false));
    $("dryRunBtn").addEventListener("click", () => runAsk(true));

    loadHealth();
    loadDocs().catch((err) => {
      $("docs").className = "error";
      $("docs").textContent = err.message;
    });
  </script>
</body>
</html>
